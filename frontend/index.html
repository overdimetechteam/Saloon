<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Viewport — viewport-fit=cover handles iPhone notch / Dynamic Island ── -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

    <!-- Favicons -->
    <link rel="icon"             type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <!-- PWA manifest (injected by vite-plugin-pwa) -->

    <!-- ── Primary Meta ── -->
    <title>BookMyStyle — Book Luxury Salons Near You</title>
    <meta name="title"       content="BookMyStyle — Book Luxury Salons Near You" />
    <meta name="description" content="Discover and book premium salons for hair, nails, skin & more. Real-time availability, instant confirmation, and a seamless luxury experience." />
    <meta name="keywords"    content="salon booking, luxury salon, hair salon, nail salon, beauty booking, spa, skin care, Sri Lanka salons" />
    <meta name="author"      content="BookMyStyle" />
    <meta name="robots"      content="index, follow" />

    <!-- ── Theme & colour ── -->
    <meta name="theme-color"           content="#0D9488" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color"           content="#0D9488" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme"          content="dark light" />
    <meta name="msapplication-TileColor" content="#0D9488" />

    <!-- ── Mobile / PWA display ── -->
    <meta name="mobile-web-app-capable"                 content="yes" />
    <meta name="apple-mobile-web-app-capable"           content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style"  content="black-translucent" />
    <meta name="apple-mobile-web-app-title"             content="BookMyStyle" />

    <!-- Prevent phone/email auto-detection on iOS (breaks layouts) -->
    <meta name="format-detection" content="telephone=no, email=no, address=no" />

    <!-- Prevent iOS from popping up "Smart App Banner" for an App Store app we don't have -->
    <meta name="apple-itunes-app" content="" />

    <!-- ── Open Graph ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://saloon-frontend-67z0.onrender.com/" />
    <meta property="og:title"       content="BookMyStyle — Book Luxury Salons Near You" />
    <meta property="og:description" content="Discover and book premium salons for hair, nails, skin & more. Real-time availability, instant confirmation." />
    <meta property="og:image"       content="https://saloon-frontend-67z0.onrender.com/pwa-512.svg" />
    <meta property="og:locale"      content="en_US" />
    <meta property="og:site_name"   content="BookMyStyle" />

    <!-- ── Twitter / X ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://saloon-frontend-67z0.onrender.com/" />
    <meta name="twitter:title"       content="BookMyStyle — Book Luxury Salons Near You" />
    <meta name="twitter:description" content="Discover and book premium salons for hair, nails, skin & more." />
    <meta name="twitter:image"       content="https://saloon-frontend-67z0.onrender.com/pwa-512.svg" />

    <!-- ── Performance hints ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://saloon-backend.onrender.com" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
