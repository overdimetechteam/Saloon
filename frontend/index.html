<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary Meta Tags -->
    <title>Saloon — Book Luxury Salons Near You</title>
    <meta name="title"       content="Saloon — Book Luxury Salons Near You" />
    <meta name="description" content="Discover and book premium salons for hair, nails, skin & more. Real-time availability, instant confirmation, and a seamless luxury experience." />
    <meta name="keywords"    content="salon booking, luxury salon, hair salon, nail salon, beauty booking, spa, skin care, Sri Lanka salons" />
    <meta name="author"      content="Saloon" />
    <meta name="robots"      content="index, follow" />

    <!-- Theme Color (teal) -->
    <meta name="theme-color" content="#0D9488" />

    <!-- Open Graph / Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://yourdomain.com/" />
    <meta property="og:title"       content="Saloon — Book Luxury Salons Near You" />
    <meta property="og:description" content="Discover and book premium salons for hair, nails, skin & more. Real-time availability, instant confirmation." />
    <meta property="og:image"       content="https://yourdomain.com/og-image.png" />
    <meta property="og:locale"      content="en_US" />
    <meta property="og:site_name"   content="Saloon" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://yourdomain.com/" />
    <meta name="twitter:title"       content="Saloon — Book Luxury Salons Near You" />
    <meta name="twitter:description" content="Discover and book premium salons for hair, nails, skin & more." />
    <meta name="twitter:image"       content="https://yourdomain.com/og-image.png" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title"            content="Saloon" />

    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#0D9488" />

    <!-- Fonts preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
