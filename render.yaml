databases:
  - name: saloon-db
    plan: free

services:
  # ── Django Backend ──────────────────────────────────────────────────────────
  - type: web
    name: saloon-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: starter
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: saloon-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "https://saloon-frontend.onrender.com"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: TWITTER_CLIENT_ID
        sync: false
      - key: TWITTER_CLIENT_SECRET
        sync: false
      - key: TWITTER_REDIRECT_URI
        sync: false

  # ── React Frontend ──────────────────────────────────────────────────────────
  - type: web
    name: saloon-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://saloon-backend.onrender.com/api"
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: VITE_TWITTER_REDIRECT_URI
        value: "https://saloon-frontend.onrender.com/auth/twitter/callback"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
